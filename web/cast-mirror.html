<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Peripheral POV Mirror</title>
    <link rel="icon" href="data:," />
    <style>
      :root {
        color-scheme: dark;
        --bg: #050605;
        --panel: rgba(10, 12, 11, 0.72);
        --panel-line: rgba(234, 255, 244, 0.18);
        --ink: #f1fff8;
        --muted: rgba(241, 255, 248, 0.68);
        --accent: #d8fff0;
        --danger: #ff8175;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--ink);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
        overflow: hidden;
      }

      .stage {
        position: fixed;
        inset: 0;
        background: #050605;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }

      video {
        position: fixed;
        width: 1px;
        height: 1px;
        left: -4px;
        top: -4px;
        opacity: 0;
        pointer-events: none;
      }

      .toolbar {
        position: fixed;
        top: 14px;
        left: 14px;
        right: 14px;
        z-index: 3;
        display: grid;
        grid-template-columns: auto minmax(180px, 320px) minmax(0, 1fr) auto;
        gap: 8px;
        align-items: center;
        pointer-events: none;
      }

      .toolbar > * {
        pointer-events: auto;
      }

      button,
      select,
      input {
        height: 36px;
        border: 1px solid var(--panel-line);
        border-radius: 7px;
        background: var(--panel);
        color: var(--ink);
        font: inherit;
        letter-spacing: 0;
      }

      button {
        min-width: 82px;
        padding: 0 14px;
        font-weight: 700;
        cursor: pointer;
      }

      button.primary {
        background: var(--accent);
        color: #07120e;
        border-color: rgba(255, 255, 255, 0.32);
      }

      button:disabled,
      select:disabled,
      input:disabled {
        opacity: 0.52;
        cursor: default;
      }

      select {
        width: 100%;
        padding: 0 10px;
      }

      .status {
        display: flex;
        gap: 10px;
        align-items: center;
        min-width: 0;
        height: 36px;
        padding: 0 11px;
        border: 1px solid var(--panel-line);
        border-radius: 7px;
        background: var(--panel);
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
      }

      .status strong {
        color: var(--ink);
        font-weight: 700;
      }

      .status.is-error {
        color: var(--danger);
      }

      .tune {
        position: fixed;
        left: 14px;
        bottom: 14px;
        z-index: 3;
        display: flex;
        gap: 9px;
        align-items: center;
        padding: 8px;
        border: 1px solid var(--panel-line);
        border-radius: 8px;
        background: var(--panel);
        color: var(--muted);
        font-size: 12px;
      }

      .tune label {
        display: grid;
        grid-template-columns: auto 94px;
        gap: 7px;
        align-items: center;
      }

      .tune input {
        width: 94px;
        height: 28px;
      }

      .live-dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: rgba(241, 255, 248, 0.35);
        box-shadow: none;
      }

      .live-dot.is-live {
        background: #ff6d5f;
        box-shadow: 0 0 18px rgba(255, 109, 95, 0.76);
      }

      @media (max-width: 760px) {
        .toolbar {
          grid-template-columns: 1fr 1fr;
        }

        .status,
        select {
          grid-column: 1 / -1;
        }

        .tune {
          right: 14px;
          flex-wrap: wrap;
        }
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <canvas id="stageCanvas" width="1280" height="720"></canvas>
      <video id="cameraVideo" muted playsinline></video>
      <section class="toolbar" aria-label="Mirror controls">
        <button id="startButton" class="primary" type="button">Start</button>
        <button id="stopButton" type="button" disabled>Stop</button>
        <select id="cameraSelect" aria-label="Camera">
          <option value="">Default camera</option>
        </select>
        <div id="status" class="status">
          <span id="liveDot" class="live-dot"></span>
          <strong id="stateText">Idle</strong>
          <span id="fpsText">0.0 fps</span>
          <span id="cropText">crop -</span>
        </div>
      </section>
      <section class="tune" aria-label="Overlay tuning">
        <label>Scale <input id="scaleInput" type="range" min="70" max="135" step="1" value="105" /></label>
        <label>X <input id="offsetXInput" type="range" min="-240" max="240" step="1" value="0" /></label>
        <label>Y <input id="offsetYInput" type="range" min="-180" max="180" step="1" value="0" /></label>
      </section>
    </main>
    <script src="/cast-mirror.js?v=20260517-bright-green-optical"></script>
  </body>
</html>
