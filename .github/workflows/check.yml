name: Check

on:
  push:
    branches:
      - main
      - public/peripheral-clean
  pull_request:

jobs:
  source-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: peripheral-hud-runtime/package-lock.json

      - name: Install HUD runtime dependencies
        run: npm --prefix peripheral-hud-runtime ci

      - name: Run source checks
        run: |
          npm run check
          npm run check:public-source:commits
