name: Check

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
      - public/peripheral-clean
  pull_request:

jobs:
  source-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: peripheral-hud-runtime/package-lock.json

      - name: Install HUD runtime dependencies
        run: npm --prefix peripheral-hud-runtime ci

      - name: Run source checks
        run: npm run check
